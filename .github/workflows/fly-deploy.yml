# Deploy to Fly.io on every push to main.
# Repo → Settings → Secrets and variables → Actions → add FLY_API_TOKEN (see https://fly.io/docs/launch/continuous-deployment-with-github-actions/)
name: Fly Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Default Fly HA is 2 Machines; Socket.IO sessions are in-memory → load balancing breaks polling (HTTP 400 on sid).
      # --ha=false keeps a single Machine unless you scale up and add Redis/sticky routing.
      - run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
