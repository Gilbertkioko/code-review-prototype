# Fly.io — https://fly.io/docs/reference/configuration/
#
# Socket.IO (in-memory Engine.IO): Fly’s default is **two** Machines for `[http_service]` apps, so `/socket.io`
# polls hit different VMs → HTTP 400 on `sid`. Use one Machine: `fly scale count 1`, and CI uses `fly deploy --ha=false`.
# Multi-machine needs Redis adapter + sticky sessions or fly-replay (see Fly “sticky sessions” blueprint).
#
# First time:
#   fly auth login
#   fly apps create code-review-sprint   # or another name, then set `app` below
#   fly secrets set TURSO_DATABASE_URL="libsql://..." TURSO_AUTH_TOKEN="..."
#   fly deploy
#
# Change `app` to match your Fly app name. `fly launch` can also generate a new fly.toml to merge.

app = "code-review-sprint-2"
primary_region = "ams"

[build]
	dockerfile = "Dockerfile"

[http_service]
	internal_port = 3000
	force_https = true
	# Keep machines running for WebSockets (paid tier); use "stop" + min_machines_running = 0 to allow sleep.
	auto_stop_machines = "off"
	auto_start_machines = true
	min_machines_running = 1

[[http_service.checks]]
	grace_period = "10s"
	interval = "30s"
	method = "GET"
	timeout = "5s"
	path = "/login"

[[vm]]
	memory = "512mb"
	cpu_kind = "shared"
	cpus = 1
